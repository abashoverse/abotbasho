# Local development overlay. Boots an anvil node forking your mainnet RPC and
# points the indexer + verify-web at it via INDEXER_CHAIN_ID=31337.
#
# Usage:
#   docker compose -f docker-compose.yml -f compose.dev.yml --profile verify up -d --build
#
# Then run `bun dev/seed.ts` once to transfer an NFT from a real holder
# (impersonated via anvil cheatcodes) to the well-known dev account
# 0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266. Import that account's private
# key into MetaMask, add a custom network for Anvil (chain id 31337,
# rpc http://localhost:8545), and walk through /verify in Discord. Same
# flow as production, zero gas. delegate.cash registry is preserved by the
# fork.
#
# Nothing here is secret; anvil's dev accounts are public and the fork URL
# comes from your existing .env.

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - "--host=0.0.0.0"
      - "--port=8545"
      - "--chain-id=31337"
      - "--fork-url=${PONDER_RPC_URL_1}"
    ports:
      - "127.0.0.1:8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8545 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  indexer:
    environment:
      - INDEXER_CHAIN_ID=31337
      - PONDER_RPC_URL_31337=http://anvil:8545
    depends_on:
      anvil:
        condition: service_healthy

  verify-web:
    environment:
      - PUBLIC_INDEXER_CHAIN_ID=31337
    depends_on:
      anvil:
        condition: service_healthy
